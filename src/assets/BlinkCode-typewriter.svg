<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 260 80" width="260" height="80">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@700&amp;display=swap');
      .blink-text {
        font-family: 'JetBrains Mono', 'Fira Code', 'SF Mono', 'Consolas', 'Liberation Mono', monospace;
        font-size: 42px;
        font-weight: 700;
        fill: #d4d4d4;
        letter-spacing: -9px;
      }
    </style>
  </defs>

  <text x="14" y="54" class="blink-text">
    <tspan opacity="0">
      B
      <animate attributeName="opacity" values="0;1" dur="0.06s" begin="0.3s" fill="freeze" calcMode="discrete"/>
    </tspan>
    <tspan dx="0" opacity="0">
      l
      <animate attributeName="opacity" values="0;1" dur="0.06s" begin="0.42s" fill="freeze" calcMode="discrete"/>
    </tspan>
    <tspan dx="0" opacity="0">
      i
      <animate attributeName="opacity" values="0;1" dur="0.06s" begin="0.54s" fill="freeze" calcMode="discrete"/>
    </tspan>
    <tspan dx="0" opacity="0">
      n
      <animate attributeName="opacity" values="0;1" dur="0.06s" begin="0.66s" fill="freeze" calcMode="discrete"/>
    </tspan>
    <tspan dx="0" opacity="0">
      k
      <animate attributeName="opacity" values="0;1" dur="0.06s" begin="0.78s" fill="freeze" calcMode="discrete"/>
    </tspan>
  </text>

  <!-- Cursor bar -->
  <rect x="175" y="18" width="4" height="44" rx="2" fill="#4f8cff" opacity="0">
    <animate attributeName="opacity"
      values="1;1;0;0"
      keyTimes="0;0.5;0.5;1"
      dur="1.1s" begin="0.85s" repeatCount="indefinite" calcMode="discrete"/>
  </rect>
</svg>
